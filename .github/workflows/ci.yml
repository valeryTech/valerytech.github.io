name: Validate site build

on:
  pull_request:
  push:
    branches-ignore:
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup site toolchain
        uses: ./.github/actions/setup-site

      - name: Build production website
        run: bash scripts/build-site.sh --host
